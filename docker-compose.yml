services:
  api:
    build: .
    image: iexplain:0.1.0
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    volumes:
      - ./config:/app/config
      - ./prompts:/app/prompts
      - ./skills:/app/skills
      - ./agent-skills:/app/agent-skills
      - ./runs:/app/runs
      - ./workspaces:/app/workspaces
