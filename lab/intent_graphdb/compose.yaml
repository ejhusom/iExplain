services:
  graphdb:
    image: ontotext/graphdb:10.8.3
    container_name: iexplain-intent-graphdb
    ports:
      - "7200:7200"
    volumes:
      - graphdb-data:/opt/graphdb/home
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:7200/rest/repositories >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

volumes:
  graphdb-data:
